<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@600;700&display=swap');

  * {
    box-sizing: border-box;
  }

  html {
    background: transparent;
    border-radius: 18px;
    overflow: hidden;
  }

  body {
    width: 290px;
    margin: 0;
    padding: 20px;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: #0D151E;
    color: #E2F0F2;
    border-radius: 18px;
    border: 1px solid rgba(32, 208, 192, 0.25);
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }

  .header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
    padding-bottom: 12px;
    border-bottom: 1px solid rgba(32, 208, 192, 0.2);
  }

  .logo-img {
    width: 32px;
    height: 32px;
    object-fit: contain;
    filter: drop-shadow(0 2px 8px rgba(32, 208, 192, 0.4));
  }

  .title-wrap {
    display: flex;
    flex-direction: column;
  }

  h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 16px;
    font-weight: 700;
    margin: 0;
    color: #E2F0F2;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    line-height: 1.2;
  }

  .subtitle {
    font-size: 11px;
    color: #8CB5C0;
    margin-top: 2px;
    font-weight: 500;
  }

  .card {
    background: #0D151E;
    border: 1px solid rgba(32, 208, 192, 0.25);
    border-radius: 16px;
    padding: 16px;
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
  }

  label {
    display: block;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: #8CB5C0;
    margin-bottom: 6px;
  }

  input {
    width: 100%;
    padding: 10px 12px;
    margin-bottom: 12px;
    border-radius: 10px;
    background: #040B0E;
    border: 1px solid rgba(32, 208, 192, 0.2);
    color: #E2F0F2;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s ease, box-shadow 0.2s ease;
  }

  input::placeholder {
    color: #4B6E78;
  }

  input:focus {
    border-color: #20D0C0;
    box-shadow: 0 0 0 1px #20D0C0;
  }

  .password-wrap {
    position: relative;
    width: 100%;
    margin-bottom: 12px;
  }

  .password-wrap input {
    margin-bottom: 0;
    padding-right: 36px;
  }

  .toggle-password-btn {
    position: absolute;
    right: 8px;
    top: 50%;
    transform: translateY(-50%);
    background: transparent;
    border: none;
    padding: 4px;
    cursor: pointer;
    color: #8CB5C0;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 6px;
    transition: color 0.2s ease;
    outline: none;
  }

  .toggle-password-btn:hover {
    color: #20D0C0;
  }

  .eye-icon {
    width: 16px;
    height: 16px;
  }

  button.btn-primary {
    width: 100%;
    padding: 10px 16px;
    margin-top: 4px;
    border-radius: 9999px;
    border: none;
    background: #20D0C0;
    color: #0D151E;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 2px 10px rgba(32, 208, 192, 0.25);
    transition: all 0.2s ease;
  }

  button.btn-primary:hover {
    background: #2ED8C8;
    transform: translateY(-1px);
    box-shadow: 0 4px 14px rgba(32, 208, 192, 0.4);
  }

  button.btn-primary:active {
    transform: scale(0.98);
  }

  button.btn-secondary {
    width: 100%;
    padding: 9px 14px;
    border-radius: 9999px;
    border: 1px solid rgba(32, 208, 192, 0.25);
    background: #0D151E;
    color: #E2F0F2;
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s ease;
  }

  button.btn-secondary:hover {
    border-color: #20D0C0;
    color: #20D0C0;
  }

  #status {
    font-size: 11px;
    color: #20D0C0;
    margin-top: 10px;
    min-height: 14px;
    text-align: center;
    font-weight: 600;
  }

  #status.error {
    color: #E04A2A;
  }

  .hidden {
    display: none !important;
  }

  .user-badge {
    background: #040B0E;
    border: 1px solid rgba(32, 208, 192, 0.2);
    border-radius: 10px;
    padding: 10px;
    margin-bottom: 12px;
    text-align: center;
  }

  .user-badge .email {
    font-size: 12px;
    font-weight: 600;
    color: #E2F0F2;
    word-break: break-all;
  }

  .status-dot {
    display: inline-block;
    width: 7px;
    height: 7px;
    background: #20D0C0;
    border-radius: 50%;
    margin-right: 6px;
  }
</style>
</head>
<body>
  <div class="header">
    <img src="logo.png" alt="Trawlist Logo" class="logo-img" />
    <div class="title-wrap">
      <h1>Trawlist</h1>
      <div class="subtitle">Ratings &amp; Reviews for YouTube</div>
    </div>
  </div>

  <div class="card">
    <form id="signin-form">
      <div id="signin-step">
        <label for="email-input">Email Address</label>
        <input id="email-input" type="email" placeholder="you@example.com" required />
        <label for="password-input">Password</label>
        <div class="password-wrap">
          <input id="password-input" type="password" placeholder="••••••••" required />
          <button type="button" id="toggle-password-btn" class="toggle-password-btn" title="Toggle password visibility">
            <svg id="eye-icon-open" class="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
            <svg id="eye-icon-closed" class="eye-icon hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
              <line x1="1" y1="1" x2="23" y2="23"/>
            </svg>
          </button>
        </div>
        <button id="sign-in-btn" type="submit" class="btn-primary">Sign In</button>
        <div style="margin-top: 14px; text-align: center; font-size: 11px; color: #8CB5C0;">
          Don't have an account? <a href="https://www.trawlist.com/login" target="_blank" rel="noopener noreferrer" style="color: #20D0C0; text-decoration: none; font-weight: 600;">Sign up on Trawlist</a>
        </div>
      </div>
    </form>

    <div id="signed-in-step" class="hidden">
      <div class="user-badge">
        <div style="font-size: 11px; color: #8CB5C0; margin-bottom: 4px;">
          <span class="status-dot"></span>Connected
        </div>
        <div id="user-email" class="email"></div>
      </div>
      <button id="sign-out" class="btn-secondary">Sign Out</button>
    </div>

    <div id="status"></div>
  </div>

  <div style="margin-top: 12px; font-size: 9px; color: #4B636A; text-align: center; line-height: 1.4; padding: 0 4px;">
    <div>Trawlist only reads YouTube video IDs to attach ratings. No outside tracking.</div>
    <div style="margin-top: 4px;">
      <a href="https://trawlist.com/privacy" target="_blank" style="color: #20D0C0; text-decoration: none;">Privacy Policy</a> &bull; YouTube™ is a trademark of Google LLC.
    </div>
  </div>

  <script src="config.js"></script>
  <script src="auth.js"></script>
  <script src="popup.js"></script>
</body>
</html>
