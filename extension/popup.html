<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<style>
  body { width: 260px; margin: 0; padding: 16px; font-family: Arial, sans-serif; background: #0F141F; color: #EDEFF3; }
  h1 { font-size: 14px; margin: 0 0 10px; color: #E8B34D; letter-spacing: 0.03em; }
  input { width: 100%; box-sizing: border-box; padding: 8px; margin-bottom: 8px; border-radius: 6px; border: 1px solid #2A3446; background: #171E2C; color: #EDEFF3; }
  button { width: 100%; padding: 8px; border-radius: 6px; border: none; background: #E8B34D; color: #0F141F; font-weight: 600; cursor: pointer; }
  #status { font-size: 11px; color: #8996AC; margin-top: 8px; min-height: 14px; }
  .hidden { display: none; }
  #signed-in-step p { font-size: 12px; color: #8996AC; margin: 0 0 10px; }
</style>
</head>
<body>
  <h1>SCRUBBED</h1>
  <div id="email-step">
    <input id="email-input" type="email" placeholder="you@example.com" />
    <button id="send-code">Send code</button>
  </div>
  <div id="code-step" class="hidden">
    <input id="code-input" type="text" placeholder="6-digit code" />
    <button id="verify-code">Verify &amp; sign in</button>
  </div>
  <div id="signed-in-step" class="hidden">
    <p>Signed in as <span id="user-email"></span></p>
    <button id="sign-out">Sign out</button>
  </div>
  <div id="status"></div>
  <script src="config.js"></script>
  <script src="auth.js"></script>
  <script src="popup.js"></script>
</body>
</html>
